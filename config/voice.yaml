# 配音配置 —— 想换声音/语速/音量,改这里
# provider: volcengine=火山引擎大模型音色 / edge_tts=微软免费在线(无需key)
provider: volcengine

# ===== 火山引擎(豆包语音) =====
# model 填音色ID。推荐男声:
#   zh_male_yuanboxiaoshu_uranus_bigtts  渊博小叔2.0(温润儒雅沉稳)推荐
#   zh_male_qingxinkuaiyi_moon_bigtts   阳光青年2.0
# speed_ratio: 0.5~2.0, 1.0=正常
model: zh_male_shenyeboke_uranus_bigtts
speed_ratio: 0.95  # 火山内置放慢
volume_ratio: 1.0

# 目标时长(秒): 超过则用 ffmpeg atempo 压缩到目标时长
# 0 = 不压缩. 设为 30 让视频稳定 30 秒
target_duration: 30

# ===== edge_tts 备选(把 provider 改成 edge_tts 时用) =====
# model: zh-CN-YunxiNeural 温柔年轻男声 / zh-CN-YunjianNeural 阳刚男声
# rate: "+0%"
# volume: "+0%"
